<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Giảng Điện Tử</title>
    <style>
        :root { --primary: #004a99; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
				
        
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        /* Nút quay về Trang Tổng */
        .back-home { text-decoration: none; color: var(--primary); font-weight: bold; display: inline-block; margin-bottom: 20px; transition: 0.3s; }
        .back-home:hover { transform: translateX(-5px); color: #d63031; }

        h1 { color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 30px; font-size: 1.5rem; }

        .lesson-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }

        .lesson-item { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px; background: #fff; border: 1px solid #eee; border-radius: 12px;
            text-decoration: none; color: #2d3436; font-weight: 600; transition: 0.3s;
        }

        .lesson-item:hover { 
            background: #eef2f7; border-color: var(--primary); 
            transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .lesson-item::before { content: "📘"; margin-right: 15px; font-size: 1.2rem; }
        .lesson-item::after { content: "Bắt đầu học ➔"; font-size: 0.8rem; color: var(--primary); font-weight: normal; }
    </style>
</head>
<body>

<div class="container">
    <!-- Nút quay về Trang Tổng (index.html ngoài cùng) -->
    <a href="../index.html" class="back-home">⬅️ Quay lại danh sách Giáo viên</a>
    
    <h1 id="teacher-title">DANH SÁCH BÀI GIẢNG</h1>

    <div id="lesson-list" class="lesson-grid">
        <!-- Bài giảng tự động hiện ở đây -->
    </div>
</div>

<script>
    // NHẬP DANH SÁCH BÀI GIẢNG VÀ LINK MOODLE TẠI ĐÂY
    const lessons = [
        { name: "Toán 4 - Tiết 58: Em làm được những gì?", url: "https://hoctructuyen.nguyenthaisonps.edu.vn/mod/url/view.php?id=363" },
		{ name: "Toán 5 - Bài 21: So sánh 2 số thập phân", url: "https://hoctructuyen.nguyenthaisonps.edu.vn/mod/url/view.php?id=363" }
        ];
    const listContainer = document.getElementById('lesson-list');

    lessons.forEach(l => {
        const item = document.createElement('a');
        item.href = l.url;
        item.className = 'lesson-item';
        // Mở bài giảng Moodle ở tab mới để không mất trang Netlify
        item.target = "_blank"; 
        item.innerText = l.name;
        listContainer.appendChild(item);
    });
</script>

</body>
</html>
